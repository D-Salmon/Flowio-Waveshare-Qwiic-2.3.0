[platformio]
default_envs = Waveshare-ESP32-S3
boards_dir = boards

[common]
waveshare_firmware_version = '"2.3.0"'
nextion_firmware_version = '"2.0.7"'

[env:Waveshare-ESP32-S3]
platform = espressif32@6.12.0
; Waveshare ESP32-S3-ETH-8DI-8RO: ESP32-S3-WROOM-1-N16R8.
; The board definition is versioned in boards/ for reproducible N16R8 builds.
board = esp32-s3-devkitc1-n16r8
framework = arduino
lib_compat_mode = strict
monitor_speed = 115200
monitor_filters = direct
lib_ldf_mode = chain
debug_tool = esp-prog
debug_init_break = tbreak setup
upload_protocol = esptool
custom_version = ${common.waveshare_firmware_version}
custom_cfgdocs_profile = flowios3
board_build.filesystem = spiffs
board_build.partitions = partitions_flowios3_ota_16mb.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.psram = enabled
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
extra_scripts =
	pre:scripts/generate_build_version.py
	pre:scripts/generate_datamodel.py
	pre:scripts/generate_runtimeui_manifest.py
	pre:scripts/prepare_spiffs_data.py
	post:scripts/export_binaries.py
build_src_filter =
	+<*>
build_flags =
	-std=c++17
	-std=gnu++17
	-D ESP32_DEVKITV1
	-D CORE_DEBUG_LEVEL=0
	-D CONFIG_LOG_COLORS=1
	-D BOARD_REV=1
	-D FLOW_ENABLE_BUFFER_USAGE_TRACKING=1
	-D FLOW_PROFILE_FLOWIOS3=1
	-D FLOW_HA_ONESHOT_DISCOVERY=0
	-D FLOW_HA_BOOT_TRACE=0
	-D FLOW_ENABLE_BOOT_LOG_CAPTURE=1
	-D FLOW_PHYSICAL_RECOVERY_PIN=21
	-D FLOW_PHYSICAL_RECOVERY_DETECT_MS=500
	-D FLOW_PHYSICAL_RECOVERY_WINDOW_MS=600000
	-D FLOW_MQTT_REQUIRE_AUTH=1
	-D FLOW_LOG_SERIAL_COLORS=1
	-D FIRMW=${common.waveshare_firmware_version}
	-D TFT_FIRMW=${common.nextion_firmware_version}
	-D FLOW_BOARD_FLOWIO_S3=1
	-D FLOW_WIRDEF_IO_AIAD=0x49u
	-D FLOW_WIRDEF_IO_AEAD=0x48u
	-D FLOW_MODDEF_IO_AGAI=ADS1X15_GAIN_4096MV
	-D FLOW_WIRDEF_IO_A2C=0u
	-D FLOW_DS18_USE_DS2484=1
	-D FLOW_DS18_DS2484_ADDRESS=0x18u
	-D FLOW_POOL_TANK_LEVEL_MONITORING_DEFAULT=0
	-D ENABLE_ETHERNET=1
	-D ETH_TIMEOUT_MS=7000
	-D WIFI_TIMEOUT_MS=12000
	-D FLOW_RTC_PCF85063=1
	-D FLOW_TIME_PREFER_INTERNAL_RTC=1
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D BOARD_HAS_PSRAM
	-D CONFIG_ASYNC_TCP_STACK_SIZE=16384
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=16
	-mfix-esp32-psram-cache-issue
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
build_unflags =
	-std=gnu++11
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_CDC_ON_BOOT=0
lib_deps =
	bblanchon/ArduinoJson @ 6.21.6
	robtillaart/RunningMedian @ 0.3.9
	robtillaart/ADS1X15 @ 0.5.0
	milesburton/DallasTemperature @ 3.11.0
	adafruit/Adafruit Unified Sensor @ 1.1.15
	adafruit/Adafruit BusIO @ 1.16.2
	adafruit/Adafruit SHT4x Library @ 1.0.5
	adafruit/Adafruit BMP280 Library @ 2.6.8
	adafruit/Adafruit BME680 Library @ 2.0.5
	wollewald/INA226_WE @ 1.3.0
	ESP32Async/AsyncTCP @ 3.4.10
	ESP32Async/ESPAsyncWebServer @ 3.11.2

[env:native]
platform = native
build_flags =
	-std=c++17
build_src_filter =
	-<*>
	+<Modules/PoolLogicModule/FiltrationWindow.cpp>
test_build_src = yes
test_filter = test_poollogic_filtration_window
