name: Firmware CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLOW_BUILD_REF: "20000101.000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install PlatformIO
        run: python -m pip install "platformio==6.1.18"
      - name: Run native unit tests
        run: platformio test -e native
      - name: Build firmware
        run: platformio run -e Waveshare-ESP32-S3
      - name: Enforce firmware partition budget
        run: python scripts/check_firmware_size.py --max-percent 85
      - name: Build SPIFFS
        run: platformio run -e Waveshare-ESP32-S3 -t buildfs
      - name: Verify release artifacts
        run: python scripts/verify_release.py
